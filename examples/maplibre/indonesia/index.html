<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeoMorpher · Indonesia Literacy Cartogram</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.8.0/dist/maplibre-gl.css" />
    <style>
        :root {
            color-scheme: light;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #map {
            width: 100%;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .overlay-controls {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 10;
            width: 100%;
            max-width: 380px;
            pointer-events: none;
        }

        .panel {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 1rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            pointer-events: all;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .panel h1 {
            margin: 0;
            font-size: 1.3rem;
            color: #f1f5f9;
        }

        .panel h2 {
            margin: 0;
            font-size: 1rem;
            color: #cbd5e1;
        }

        .panel p {
            margin: 0;
            color: #94a3b8;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .slider,
        .toggle,
        .layer-toggles {
            display: grid;
            gap: 0.6rem;
        }

        label {
            font-size: 0.9rem;
            font-weight: 500;
            color: #cbd5e1;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        input[type="range"] {
            width: 100%;
            accent-color: #06b6d4;
            height: 6px;
            border-radius: 3px;
            background: rgba(148, 163, 184, 0.2);
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #06b6d4;
            cursor: pointer;
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.2);
        }

        input[type="checkbox"] {
            accent-color: #06b6d4;
            width: 1rem;
            height: 1rem;
            cursor: pointer;
        }

        .legend {
            display: grid;
            gap: 0.5rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .legend-swatch {
            width: 0.75rem;
            height: 0.75rem;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .stat-group {
            display: grid;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: #94a3b8;
            padding-top: 0.5rem;
            border-top: 1px solid rgba(148, 163, 184, 0.2);
        }

        .stat {
            display: flex;
            justify-content: space-between;
        }

        .stat strong {
            color: #f1f5f9;
        }

        #status {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 10;
            font-size: 0.85rem;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.2);
            color: #94a3b8;
            padding: 0.6rem 1rem;
            border-radius: 0.5rem;
        }

        footer {
            position: fixed;
            bottom: 1.5rem;
            left: 1.5rem;
            font-size: 0.75rem;
            color: #64748b;
            z-index: 5;
        }
    </style>
    <script type="importmap">
      {
        "imports": {
          "maplibre-gl": "https://esm.sh/maplibre-gl@5.8.0?bundle",
          "@turf/turf": "https://esm.sh/@turf/turf@6.5.0?bundle",
          "@turf/helpers": "https://esm.sh/@turf/helpers@6.5.0?bundle",
          "flubber": "https://esm.sh/flubber@0.4.2?bundle",
          "lodash/cloneDeep.js": "https://esm.sh/lodash@4.17.21/cloneDeep?bundle",
          "lodash/keyBy.js": "https://esm.sh/lodash@4.17.21/keyBy?bundle",
          "lodash/mapValues.js": "https://esm.sh/lodash@4.17.21/mapValues?bundle",
          "lodash/isEmpty.js": "https://esm.sh/lodash@4.17.21/isEmpty?bundle"
        }
      }
    </script>
</head>

<body>
    <div id="map"></div>

    <div class="overlay-controls">
        <section class="panel">
            <h1>Indonesia Literacy Cartogram</h1>

            <div>
                <h2>Explore literacy indicators</h2>
                <p>
                    Tween between provincial boundaries and a square grid cartogram.
                    Rose charts show five literacy indicators per province.
                </p>
            </div>

            <div class="slider">
                <label for="morphFactor">Morph factor: <strong id="factorValue">0.00</strong></label>
                <input id="morphFactor" type="range" min="0" max="1" step="0.05" value="0" />
            </div>

            <div class="toggle">
                <label for="basemapEffectToggle">
                    <input id="basemapEffectToggle" type="checkbox" checked />
                    Darken basemap
                </label>
            </div>

            <div>
                <h3 style="margin: 0 0 0.75rem; font-size: 0.95rem; color: #cbd5e1;">Layers</h3>
                <div class="layer-toggles">
                    <label><input id="toggle-regular" type="checkbox" checked /> Regular geography</label>
                    <label><input id="toggle-interpolated" type="checkbox" checked /> Tween morph</label>
                    <label><input id="toggle-cartogram" type="checkbox" checked /> Grid cartogram</label>
                    <label><input id="toggle-glyphs" type="checkbox" checked /> Rose charts</label>
                </div>
            </div>

            <div class="legend">
                <h3 style="margin: 0 0 0.75rem; font-size: 0.95rem; color: #cbd5e1;">Metrics</h3>
                <ul id="glyphLegend" style="list-style: none; margin: 0; padding: 0; display: grid; gap: 0.5rem;"></ul>
            </div>

            <div class="stat-group">
                <div class="stat"><span>Regular features</span><strong id="count-regular">–</strong></div>
                <div class="stat"><span>Cartogram features</span><strong id="count-cartogram">–</strong></div>
            </div>
        </section>
    </div>

    <footer>
        <span id="status">Loading…</span> · <a href="https://github.com/danylaksono/geo-morpher"
            style="color: #64748b; text-decoration: none;">GeoMorpher</a>
    </footer>
    <script type="module" src="./main.js"></script>
</body>

</html>
